<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Cyrillic Transcriber for Polish</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An easy-to-use web app for transcribing Polish text into the Cyrillic script.">
    <meta name="keywords" content="Polish, Cyrillic, transliteration, transcription, orthography">
    <meta name="author" content="Daniel Saeger">

    <meta property="og:title" content="Cyrillic Transcriber for Polish">
    <meta property="og:description" content="An easy-to-use web app for transcribing Polish text into the Cyrillic script.">
    <meta property="og:image" type="image/svg+xml" content="https://raw.githubusercontent.com/glyphdoggo/cyrillic_for_polish/main/banner.png">
    <meta property="og:url" content="https://glyphdoggo.github.io/cyrillic-for-polish/">

    <meta name="twitter:title" content="Cyrillic Transcriber for Polish">
    <meta name="twitter:description" content="An easy-to-use web app for transcribing Polish text into the Cyrillic script.">
    <meta name="twitter:image" type="image/svg+xml" content="https://raw.githubusercontent.com/glyphdoggo/cyrillic_for_polish/main/banner.png">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="https://raw.githubusercontent.com/glyphdoggo/cyrillic-for-polish/main/icon.svg">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap');
      
      html, body {
        background-color: #2C2131;
        color: #fed;
        height: 100%;
        margin: 0;
        font-family: "Noto Sans", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }
      
      textarea {
        font-family: "Noto Sans", sans-serif;
        background-color: #fed;
        color: #2C2131;
        width: 100%;
        padding: 16px;
        font-size: 1rem;
        line-height: 1.25;
        border-radius: 10px;
        border: none;
        box-sizing: border-box;
        resize: vertical;
        max-width: 80%;
      }

      .interface {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .options {
        margin-top: 10px;
        font-size: 1.1rem;
      }
      
      h3 { font-size: 1.5rem; }
      h4 { opacity: .5; font-weight: 400; }
    </style>
  </head>
  <body>
    <div class="interface">
      <div>
        <h3>CYRILLIC FOR POLISH</h3>
        <h4>A Cyrillic Orthography for the Polish Language</h4>
      </div>
      
      <div>
        <!-- <p>Type or paste text below:</p> -->
        <textarea rows="6" id="input" placeholder="Type here! Wpisz tutaj :)" oninput="transcribe()"></textarea>
        <!-- Wszyscy ludzie rodzą się wolni i równi w swojej godności i prawach... -->
        <!-- W Szczebrzeszynie chrząszcz brzmi w trzcinie... -->
      </div>
      
      <div>
        <!-- <p>Result:</p> -->
        <textarea rows="6" id="output" readonly></textarea>
      </div>
      
      <div class="options">
        <label><input type="radio" name="orthography" value="ru" checked> Russian system</label>
        <br><br>
        <label><input type="radio" name="orthography" value="ua"> Ukrainian system</label>
      </div>
    </div>
    <script>
      const SYSTEMS = {
        ru: {
          isRussian: true,
          vowelsHard: { a:"а", e:"э", i:"и", y:"ы", o:"о", ó:"у", u:"у", ą:"ѫ", ę:"ѧ" },
          vowelsSoft: { a:"я", e:"е", i:"и", y:"и", o:"ё", ó:"ю", u:"ю", ą:"ѭ", ę:"ѩ" },
          consonants: {
            b:"б", c:"ц", ć:"т", d:"д", f:"ф", g:"г", h:"х", j:"й", k:"к", l:"л", ł:"л", m:"м", n:"н", ń:"н", p:"п", q:"к", r:"р", s:"с", ś:"с", t:"т", v:"в", w:"в", x:"кс", z:"з", ź:"з", ż:"ж",
            ch:"х", cz:"ч", dz:"ѕ", dź:"д", rz:"р", sz:"ш", śr:"ср", źr:"зр", ph:"ф", szcz:"щ", czcz:"тщ",
            ia:"я", ią:"ѭ", ie:"е", ię:"ѩ", io:"ё", iu:"ю", ió:"ю", ja:"я", ją:"ѭ", je:"е", ję:"ѩ", ji:"и", jo:"ё", ju:"ю", jó:"ю"
          },
          exceptions: {
            radi:"ради", mafi:"мафи", magi:"маги", mani:"мани", chemi:"хэми", tarzan:"тарзан", erzac:"эрзац", 
            murzasich:"мурзасих", dies:"диз", diab:"диаб", zamarza:"замарза", mierzi:"мерзи", podzamcz:"подзамч", 
            podzb:"подзб", podzesp:"подзэсп", podziem:"подзем", podzwrot:"подзврот", podziérzgn:"поддерьгн", 
            podzyg:"подзыг", ludzk:"людск"
          }
        },
        ua: {
          isRussian: false,
          vowelsHard: { a:"а", ą:"ѫ", e:"е", ę:"ѧ", i:"і", y:"и", o:"о", ó:"у", u:"у" },
          vowelsSoft: { a:"я", ą:"ѭ", e:"є", ę:"ѩ", i:"і", y:"і", o:"ьо", ó:"ю", u:"ю" },
          consonants: {
            b:"б", c:"ц", ć:"т", d:"д", f:"ф", g:"ґ", h:"г", j:"й", k:"к", l:"л", ł:"л", m:"м", n:"н", ń:"н", p:"п", q:"к", r:"р", s:"с", ś:"с", t:"т", v:"в", w:"в", x:"кс", z:"з", ź:"з", ż:"ж",
            ch:"х", cz:"ч", dz:"ѕ", dź:"д", rz:"р", sz:"ш", śr:"ср", źr:"зр", ph:"ф", szcz:"щ", czcz:"тщ",
            ia:"я", ią:"ѭ", ie:"є", ię:"ѩ", ii:"ї", io:"ьо", iu:"ю", ió:"ю", ja:"я", ją:"ѭ", je:"є", ję:"ѩ", ji:"і", jo:"ьо", ju:"ю", jó:"ю"
          },
          exceptions: {
            radi:"раді", mafi:"мафі", magi:"магі", mani:"мані", chemi:"хемі", tarzan:"тарзан", erzac:"ерзац", 
            murzasich:"мурзасіх", dies:"диз", zamarza:"замарза", mierzi:"мєрзі", podzamcz:"подзамч", 
            podzb:"подзб", podzesp:"подзесп", podziem:"подзєм", podzwrot:"подзврот", podziérzgn:"поддєрьґн", 
            podzyg:"подзиґ", ludzk:"людск"
          }
        }
      };

      const PALATALIZING = new Set(["dź","l","rz","ć","ń","ś","ź","śr","źr"]);
      const SOFT_VOWELS = new Set(["ia","ią","ie","ię","io","ió","iu"]);
      const SPECIAL_PREV = new Set(["c", "cz", "dz", "sz", "szcz", "ż", "czcz"]);
      const SOFT_SIGN_WORDS = new Set([
        "brew", "brzoskiew", "bukiew", "cerkiew", "chorągiew", "cietrzew", "czerw", "jątrew", "kotew", "krew", "marchew", "mątew", "nów", "rzodkiew", "wiećw", "wrocław", "zełw", "żełw", "żółw",
        "drób", "gołąb", "głąb", "kiełb", "źreb", "bluszcz", "dreszcz", "czarnoziem", "osiem", "ośm", "siedem", "ziem", "konop",
        "brocz", "cyc", "kokosz", "mysz", "młodzież", "plesz", "pustosz", "rozkosz", "wesz", "łeż", "łącz"
      ]);

      for (const key in SYSTEMS) {
        SYSTEMS[key].compiledExceptions = Object.entries(SYSTEMS[key].exceptions).map(([latin, cyrillic]) => ({
          regex: new RegExp("^" + latin + "(.*)$"),
          cyrillic
        }));
      }

      function applyExceptions(wordLower, cfg) {
        for (const { regex, cyrillic } of cfg.compiledExceptions) {
          const match = wordLower.match(regex);
          if (match) {
            return cyrillic + (match[1] ? transliterateWord(match[1], cfg) : "");
          }
        }
        return null;
      }

      function handleCasing(original, mapped) {
        if (original === original.toUpperCase()) return mapped.toUpperCase();
        if (original === original.toLowerCase()) return mapped.toLowerCase();

        let result = "";
        const scale = original.length / mapped.length;

        for (let i = 0; i < mapped.length; i++) {
          const origIndex = Math.min(Math.floor(i * scale), original.length - 1);
          const origChar = original[origIndex];

          if (origChar === origChar.toUpperCase() && origChar !== origChar.toLowerCase()) {
            result += mapped[i].toUpperCase();
          } else {
            result += mapped[i].toLowerCase();
          }
        }
        return result;
      }

      function transcribe() {
        const selected = document.querySelector('input[name="orthography"]:checked')?.value || "ru";
        const cfg = SYSTEMS[selected];
        
        cfg.nonSoftSignFollowers = new Set([
          ...Object.keys(cfg.vowelsHard),
          ...Object.keys(cfg.vowelsSoft),
          ...PALATALIZING,
        ]);

        const text = document.getElementById("input").value;
        const tokens = text.match(/(\p{L}+|\P{L}+)/gu) || [];
        
        const out = tokens.map(tok => {
          if (/^\p{L}+$/u.test(tok)) {
            const lower = tok.toLowerCase();
            const exceptionResult = applyExceptions(lower, cfg);
            return handleCasing(tok, exceptionResult || transliterateWord(lower, cfg));
          }
          return tok;
        }).join("");

        document.getElementById("output").value = out;
      }

      function transliterateWord(wordLower, cfg) {
        let result = "";
        let i = 0;
        let prevCons = "";

        while (i < wordLower.length) {
          let matched = false;

          for (const length of [4, 3, 2, 1]) {
            if (i + length > wordLower.length) continue;
            const chunk = wordLower.slice(i, i + length);

            if (cfg.consonants[chunk]) {
              let mapped = cfg.consonants[chunk];
              const nextChar = wordLower[i + length] || "";
              const nextTwo = wordLower.slice(i + length, i + length + 2);

              if (chunk === "c" && nextChar === "i") mapped = "т";
              else if (chunk === "dz" && nextChar === "i") mapped = "д";
              else if (chunk === "d" && SOFT_VOWELS.has(nextTwo)) mapped = cfg.isRussian ? "ды" : "ди";
              else if (chunk === "t" && SOFT_VOWELS.has(nextTwo)) mapped = cfg.isRussian ? "ты" : "ти";
              else if (chunk === "r" && SOFT_VOWELS.has(nextTwo)) mapped = cfg.isRussian ? "ры" : "ри";

              if (chunk === "ś" || chunk === "ź") {
                const nextCluster3 = wordLower.slice(i + length, i + length + 3);
                const nextClusterIsSoft = nextCluster3.startsWith("dź") || nextCluster3.startsWith("dzi") || nextCluster3.startsWith("rz");
                const nextFollowedBySoft = ["i", "j"].includes(nextTwo[1]);

                if (i + length >= wordLower.length || (
                  !["i", "j"].includes(nextChar) &&
                  !cfg.nonSoftSignFollowers.has(nextChar) &&
                  !nextFollowedBySoft &&
                  !nextClusterIsSoft
                )) {
                  mapped += "ь";
                }
              } else if (PALATALIZING.has(chunk) && !cfg.nonSoftSignFollowers.has(nextChar)) {
                mapped += "ь";
              }

              if (["ł", "n", "s", "z"].includes(chunk) && nextChar === "j") {
                mapped += "ъ";
              }

              result += mapped;
              prevCons = chunk;
              i += length;
              matched = true;
              break;
            }
          }

          if (matched) continue;

          const current = wordLower[i];
          if (cfg.vowelsHard[current]) {
            if (prevCons && PALATALIZING.has(prevCons)) {
              result += cfg.vowelsSoft[current];
            } else if (cfg.isRussian && ["e", "i", "y"].includes(current) && SPECIAL_PREV.has(prevCons)) {
              result += cfg.vowelsSoft[current];
            } else {
              result += cfg.vowelsHard[current];
            }
          } else {
            result += current;
          }
          prevCons = "";
          i += 1;
        }

        if (SOFT_SIGN_WORDS.has(wordLower)) {
          result += "ь";
        }

        return result;
      }

      document.querySelectorAll('input[name="orthography"]').forEach(r => {
        r.addEventListener('change', transcribe);
      });
    </script>
  </body>
</html>
