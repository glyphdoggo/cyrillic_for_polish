<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Polish Cyrillic Transcriber</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An easy-to-use tool for transcribing Polish text into the Cyrillic script.">
    <meta name="keywords" content="Polish, Cyrillic, transliteration, transcription, orthography">
    <meta name="author" content="Daniel Saeger">

    <meta property="og:title" content="Polish Cyrillic Transcriber">
    <meta property="og:description" content="An easy-to-use web application for transcribing Polish text into the Cyrillic script, featuring different orthographic systems.">
    <meta property="og:image" content="https://raw.githubusercontent.com/glyphdoggo/cyrillic_for_polish/main/banner.png">
    <meta property="og:url" content="https://glyphdoggo.github.io/cyrillic-for-polish/">

    <meta name="twitter:title" content="Polish Cyrillic Transcriber">
    <meta name="twitter:description" content="An easy-to-use tool for transcribing Polish text into the Cyrillic script.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/glyphdoggo/cyrillic_for_polish/main/banner.png">
    <meta name="twitter:url" content="https://glyphdoggo.github.io/cyrillic-for-polish/">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="https://raw.githubusercontent.com/glyphdoggo/cyrillic-for-polish/main/icon.svg">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,700;1,400&display=swap');

      html, body {
        margin: 0;
        background-color: #3f2346;
        color: #fed;
        height: 100%;
        font-family: "Noto Sans", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }
      textarea {
        font-family: "Noto Sans", sans-serif;
        background-color: #fed;
        color: #3f2346;
        width: 100%;
        padding: 20px;
        line-height: 1.25;
        border-radius: 10px;
        border: none;
        box-sizing: border-box;
        resize: vertical;
        max-width: 70%;
      }
      .interface {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }
      .buttons {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 30px;
      }
      .btn {
       background: #3f2346;
       color: #fed;
       border: 2px solid #fed;
       width: 150px;
       height: 40px;
       border-radius: 10px;
       cursor: pointer;
       transition: all .3s ease;
       font-size: 16px;
      }
      .btn:hover {
       background: #8d549a;
      }
      .btn:active {
       background: #3f2346;
       transform: scale(0.95);
      }
      h3 { font-size: 22px }
      h4 { opacity: .5; font-weight: 400; font-style: italic }
    </style>
  </head>
  <body>
    <div class="interface">
      <div>
        <h3>POLISH CYRILLIC TRANSCRIBER</h3>
        <h4>A Cyrillic orthography for the Polish language</h4>
      </div>
      
      <div>
        <textarea rows="5" id="input" placeholder="Type here! Wpisz tutaj :)" oninput="transcribe()"></textarea>
      </div>
      
      <div>
        <textarea rows="5" id="output" readonly></textarea>
      </div>
      
      <div class="buttons">
        <input id="ortho-toggle" class="btn" type="button" title="Toggle orthographic system" data-mode="ru" value="Russian mode" onclick="toggleMode()">
        <input id="sample-btn" class="btn" type="button" title="Load sample text" value="Sample text" onclick="loadSample()">
      </div>
    </div>
    <script>
      const SAMPLES = [
        "Wszyscy ludzie rodzą się wolni i równi w swej godności i w swych prawach. Są oni obdarzeni rozumem i sumieniem i powinni postępować wobec innych w duchu braterstwa.\n\nKażdy człowiek posiada wszystkie prawa i wolności zawarte w niniejszej Deklaracji, bez względu na jakiekolwiek różnice rasy, koloru skóry, płci, języka, religii, poglądów politycznych lub innych przekonań, narodowości, pochodzenia społecznego, majątku, urodzenia lub jakiekolwiek inne różnice.\n\nNie wolno ponadto czynić żadnej różnicy w zależności od statusu politycznego, prawnego lub międzynarodowego kraju lub terytorium, do którego dana osoba przynależy, bez względu na to, czy jest on niepodległy, powierniczy, autonomiczny lub poddany innym ograniczeniom suwerenności.\n\nKażdy człowiek ma prawo do życia, wolności i bezpieczeństwa swej osoby.",
        "Litwo, Ojczyzno moja! ty jesteś jak zdrowie;\nIle cię trzeba cenić, ten tylko się dowie,\nKto cię stracił. Dziś piękność twą w całej ozdobie\nWidzę i opisuję, bo tęsknię po tobie.\n\nPanno święta, co Jasnej bronisz Częstochowy\nI w Ostrej świecisz Bramie! Ty, co gród zamkowy\nNowogródzki ochraniasz z jego wiernym ludem!\nJak mnie dziecko do zdrowia powróciłaś cudem\n(— Gdy od płaczącej matki, pod Twoją opiekę\nOfiarowany martwą podniosłem powiekę;\nI zaraz mogłem pieszo, do Twych świątyń progu\nIść za wrócone życie podziękować Bogu —)\nTak nas powrócisz cudem na Ojczyzny łono!...\nTymczasem, przenoś moją duszę utęsknioną\nDo tych pagórków leśnych, do tych łąk zielonych,\nSzeroko nad błękitnym Niemnem rozciągnionych;\nDo tych pól malowanych zbożem rozmaitem,\nWyzłacanych pszenicą, posrebrzanych żytem;\nGdzie bursztynowy świerzop, gryka jak śnieg biała,\nGdzie panieńskim rumieńcem dzięcielina pała,\nA wszystko przepasane jakby wstęgą, miedzą\nZieloną, na niej zrzadka ciche grusze siedzą.",
        "Północny Wiatr i Słońce pokłóciły się o to, który z nich jest silniejszy. Podczas gdy dyskutowali z wielkim żarem i wrzawą, drogą przeszedł Podróżnik owinięty płaszczem.\n\t— Umówmy się — rzekło Słońce — że ten z nas jest silniejszy, kto zedrze z Wędrowca płaszcz.\n\t— Dobrze — warknął Północny Wiatr i natychmiast posłał na człowieka zimny, wyjący podmuch.\n\tPrzy pierwszym natarciu wiatru końce płaszcza owinęły się wokół ciała mężczyzny. Natychmiast więc owinął go szczelnie wokół siebie, a im mocniej wiał Wiatr, tym mocniej trzymał płaszcz.\n\tPółnocny Wiatr szarpał ze złością płaszcz, ale wszystkie jego wysiłki poszły na marne. Wtedy zaczęło Słońce przejęło inicjatywę w działaniu.\n\tZ początku jego promienie były łagodne, a w przyjemnym cieple po przenikliwym chłodzie Północnego Wiatru Podróżnik rozpiął płaszcz i zwisał mu on luźno z ramion.\n\tPromienie słoneczne stawały się coraz cieplejsze.\n\tMężczyzna zdjął czapkę i otarł czoło. W końcu zrobiło mu się tak gorąco, że zdjął płaszcz i aby uciec przed palącym Słońcem, rzucił się w mile widziany cień przydrożnego drzewa.",
        "W Szczebrzeszynie chrząszcz brzmi w trzcinie\nI Szczebrzeszyn z tego słynie.\n\nWół go pyta: „Panie chrząszczu,\nPo cóż pan tak brzęczy w gąszczu?”\n\n„Jak to — po co? To jest praca,\nKażda praca się opłaca”.\n\n„A cóż za to pan dostaje?”\n\n„Też pytanie! Wszystkie gaje,\nWszystkie trzciny po wsze czasy,\nŁąki, pola oraz lasy,\nNawet rzeczki, nawet zdroje,\nWszystko to jest właśnie moje!”\n\nWół pomyślał: „Znakomicie,\nTeż rozpocznę takie życie”.\nWrócił do dom i wesoło\nZaczął brzęczeć pod stodołą\nPo wolemu, tęgim basem.\nA tu Maciek szedł tymczasem.\n\nJak nie wrzaśnie: „Cóż to znaczy?\nCzemu to się wół próżniaczy?!”\n„Jak to? Czyż ja nic nie robię?\nPrzecież właśnie brzęczę sobie!”\n\n„Ja ci tu pobrzęczę, wole,\nDosyć tego! Jazda w pole!”\n\nI dał taką mu robotę,\nŻe się wół oblewał potem.\n\nPo robocie pobiegł w gąszcze.\n„Już ja to na chrząszczu pomszczę!”\n\nLecz nie zastał chrząszcza w trzcinie,\nBo chrząszcz właśnie brzęczał w Pszczynie."
      ];
      
      let sampleIndex = 0;

      function loadSample() {
        const inputArea = document.getElementById("input");
        
        inputArea.value = "";
        
        inputArea.value = SAMPLES[sampleIndex];
        sampleIndex = (sampleIndex + 1) % SAMPLES.length;
        
        transcribe();
      }

      const SYSTEMS = {
        ru: {
          isRussian: true,
          vowelsHard: { a:"а", ą:"ѫ", e:"э", ę:"ѧ", i:"и", y:"ы", o:"о", ó:"у", u:"у" },
          vowelsSoft: { a:"я", ą:"ѭ", e:"е", ę:"ѩ", i:"и", y:"и", o:"ё", ó:"ю", u:"ю" },
          consonants: {
            b:"б", c:"ц", ć:"т", d:"д", f:"ф", g:"г", h:"х", j:"й", k:"к", l:"л", ł:"л", m:"м", n:"н", ń:"н", p:"п", q:"к", r:"р", s:"с", ś:"с", t:"т", v:"в", w:"в", x:"кс", z:"з", ź:"з", ż:"ж",
            ch:"х", cz:"ч", dz:"ѕ", dź:"д", rz:"р", sz:"ш", śr:"ср", źr:"зр", ph:"ф", szcz:"щ", czcz:"тщ",
            ia:"я", ią:"ѭ", ie:"е", ię:"ѩ", io:"ё", iu:"ю", ió:"ю", ja:"я", ją:"ѭ", je:"е", ję:"ѩ", ji:"и", jo:"ё", ju:"ю", jó:"ю"
          },
          exceptions: {
            mafi:"мафи", magi:"маги", mani:"мани", mari:"мари", chemi:"хэми", dies:"диз",
            tarzan:"тарзан", erzac:"эрзац", murzasich:"мурзасих", zamarza:"замарза", mierzi:"мерзи",
            podzamcz:"подзамч", podzb:"подзб", podzesp:"подзэсп", podziem:"подзем", podzwrot:"подзврот", podziérzgn:"поддерьгн", podzyg:"подзыг", ludzk:"людск",
            mln: "млн"
          }
        },
        ua: {
          isRussian: false,
          vowelsHard: { a:"а", ą:"ѫ", e:"е", ę:"ѧ", i:"і", y:"и", o:"о", ó:"у", u:"у" },
          vowelsSoft: { a:"я", ą:"ѭ", e:"є", ę:"ѩ", i:"і", y:"і", o:"ьо", ó:"ю", u:"ю" },
          consonants: {
            b:"б", c:"ц", ć:"т", d:"д", f:"ф", g:"ґ", h:"г", j:"й", k:"к", l:"л", ł:"л", m:"м", n:"н", ń:"н", p:"п", q:"к", r:"р", s:"с", ś:"с", t:"т", v:"в", w:"в", x:"кс", z:"з", ź:"з", ż:"ж",
            ch:"х", cz:"ч", dz:"ѕ", dź:"д", rz:"р", sz:"ш", śr:"ср", źr:"зр", ph:"ф", szcz:"щ", czcz:"тщ",
            ia:"я", ią:"ѭ", ie:"є", ię:"ѩ", ii:"ії", io:"ьо", iu:"ю", ió:"ю", ja:"я", ją:"ѭ", je:"є", ję:"ѩ", ji:"ій", jo:"ьо", ju:"ю", jó:"ю"
          },
          exceptions: {
            mafi:"мафі", magi:"магі", mani:"мані", mari:"марі", chemi:"хемі", dies:"диз",
            tarzan:"тарзан", erzac:"ерзац", murzasich:"мурзасіх", zamarza:"замарза", mierzi:"мєрзі",
            podzamcz:"подзамч", podzb:"подзб", podzesp:"подзесп", podziem:"подзєм", podzwrot:"подзврот", podziérzgn:"поддєрьґн", podzyg:"подзиґ", ludzk:"людск",
            mln: "млн"
          }
        }
      };

      const PALATALIZING = new Set(["dź","l","rz","ć","ń","ś","ź","śr","źr"]);
      const SOFT_VOWELS = new Set(["ia","ią","ie","ię","io","ió","iu"]);
      const SPECIAL_PREV = new Set(["c", "cz", "dz", "sz", "szcz", "ż", "czcz"]);
      const SOFT_SIGN_WORDS = new Set([
        "brew", "brzoskiew", "bukiew", "cerkiew", "chorągiew", "cietrzew", "czerw", "jątrew", "kotew", "krew", "marchew", "mątew", "nów", "rzodkiew", "wiećw", "wrocław", "zełw", "żełw", "żółw", "drób", "gołąb", "głąb", "kiełb", "źreb", "bluszcz", "dreszcz", "czarnoziem", "osiem", "ośm", "siedem", "ziem", "konop", "brocz", "cyc", "kokosz", "młodzież", "plesz", "pustosz", "mysz", "łeż", "wesz", "rozkosz", "łącz"
      ]);

      for (const key in SYSTEMS) {
        SYSTEMS[key].compiledExceptions = Object.entries(SYSTEMS[key].exceptions).map(([latin, cyrillic]) => ({
          regex: new RegExp("^" + latin + "(.*)$"),
          cyrillic
        }));
      }

      function applyExceptions(wordLower, cfg) {
        for (const { regex, cyrillic } of cfg.compiledExceptions) {
          const match = wordLower.match(regex);
          if (match) {
            return cyrillic + (match[1] ? transliterateWord(match[1], cfg) : "");
          }
        }
        return null;
      }

      function toggleMode() {
        const toggle = document.getElementById("ortho-toggle");
        const currentMode = toggle.getAttribute("data-mode");
        const newMode = (currentMode === "ru") ? "ua" : "ru";
        
        toggle.setAttribute("data-mode", newMode);
        
        toggle.value = (newMode === "ua") ? "Ukrainian mode" : "Russian mode";
        
        transcribe();
      }

      function transcribe() {
        const toggle = document.getElementById("ortho-toggle");
        const selected = toggle.getAttribute("data-mode") || "ru";
        const cfg = SYSTEMS[selected];
        
        cfg.nonSoftSignFollowers = new Set([
          ...Object.keys(cfg.vowelsHard),
          ...Object.keys(cfg.vowelsSoft),
          ...PALATALIZING,
        ]);

        const text = document.getElementById("input").value;
        const tokens = text.match(/(\p{L}+|\P{L}+)/gu) || [];
        
        const out = tokens.map(tok => {
          if (/^\p{L}+$/u.test(tok)) {
            const lower = tok.toLowerCase();
            const exceptionResult = applyExceptions(lower, cfg);
            
            if (exceptionResult) {
              if (tok === tok.toUpperCase()) return exceptionResult.toUpperCase();
              if (tok[0] === tok[0].toUpperCase()) return exceptionResult[0].toUpperCase() + exceptionResult.slice(1);
              return exceptionResult;
            }
            
            return transliterateWord(tok, cfg);
          }
          return tok;
        }).join("");

        document.getElementById("output").value = out;
      }

      document.getElementById("input").addEventListener('input', transcribe);

      function transliterateWord(word, cfg) {
        const wordLower = word.toLowerCase();
        let result = "";
        let i = 0;
        let prevCons = "";

        function matchSliceCasing(sourceSlice, targetString) {
          if (sourceSlice === sourceSlice.toUpperCase()) return targetString.toUpperCase();
          if (sourceSlice === sourceSlice.toLowerCase()) return targetString.toLowerCase();
          if (sourceSlice[0] === sourceSlice[0].toUpperCase()) {
            return targetString[0].toUpperCase() + targetString.slice(1).toLowerCase();
          }
          return targetString.toLowerCase();
        }

        while (i < word.length) {
          let matched = false;

          for (const length of [4, 3, 2, 1]) {
            if (i + length > word.length) continue;
            const chunkLower = wordLower.slice(i, i + length);
            const chunkOriginal = word.slice(i, i + length);

            if (chunkLower === "ia" || chunkLower === "io" || chunkLower === "ja" || chunkLower === "jo") {
              const prevChar = wordLower[i - 1] || "";
              const prevTwo = wordLower.slice(i - 2, i) || "";
              
              const coronals = ["d", "t"]; /* "z", "r", "l", "n", "s",*/
              let isAfterCoronal = coronals.includes(prevChar);
              
              if (prevChar === "d" && prevTwo === "zi") isAfterCoronal = false;
              if (prevChar === "z" && ["d", "s", "r"].includes(prevTwo[0])) isAfterCoronal = false;

              let mapped = "";

              if (cfg.isRussian) {
                if (isAfterCoronal) {
                  const vowelMap = { ia: "иа", io: "ио", ja: "иа", jo: "ио" };
                  // const vowelMap = { ia: "ья", io: "ьё", ja: "ья", jo: "ьё" };
                  mapped = vowelMap[chunkLower];
                }
              } else {
                const isAfterVowel = Object.keys(cfg.vowelsHard).includes(prevChar) || Object.keys(cfg.vowelsSoft).includes(prevChar);
                if (isAfterCoronal) {
                  const vowelMap = { ia: "ія", io: "іо", ja: "ія", jo: "іо" };
                  mapped = vowelMap[chunkLower];
                } else if (i === 0 || isAfterVowel) {
                  if (chunkLower.endsWith("a")) mapped = "я";
                  else mapped = "йо";
                  if (i === 0 && chunkLower === "io") mapped = "іо";
                } else {
                  mapped = (chunkLower.endsWith("a")) ? "я" : "ьо";
                }
              }

              if (mapped) {
                result += matchSliceCasing(chunkOriginal, mapped);
                prevCons = "";
                i += 2;
                matched = true;
                break;
              }
            }

            if (cfg.consonants[chunkLower]) {
              let mapped = cfg.consonants[chunkLower];
              const nextChar = wordLower[i + length] || "";
              const nextTwo = wordLower.slice(i + length, i + length + 2);

              if (chunkLower === "c" && nextChar === "i") mapped = "т";
              else if (chunkLower === "dz" && nextChar === "i") mapped = "д";

              if (chunkLower === "ś" || chunkLower === "ź") {
                const nextCluster3 = wordLower.slice(i + length, i + length + 3);
                const nextClusterIsSoft = nextCluster3.startsWith("dź") || nextCluster3.startsWith("dzi") || nextCluster3.startsWith("rz");
                const nextFollowedBySoft = ["i", "j"].includes(nextTwo[1]);

                if (i + length >= word.length || (
                  !["i", "j"].includes(nextChar) &&
                  !cfg.nonSoftSignFollowers.has(nextChar) &&
                  !nextFollowedBySoft &&
                  !nextClusterIsSoft
                )) {
                  mapped += "ь";
                }
              } else if (PALATALIZING.has(chunkLower) && !cfg.nonSoftSignFollowers.has(nextChar)) {
                mapped += "ь";
              }

              if (["ł", "n", "s", "z"].includes(chunkLower) && nextChar === "j") {
                mapped += "ъ";
              }

              result += matchSliceCasing(chunkOriginal, mapped);
              prevCons = chunkLower;
              i += length;
              matched = true;
              break;
            }
          }

          if (matched) continue;

          const currentLower = wordLower[i];
          const currentOriginal = word[i];

          if (cfg.vowelsHard[currentLower]) {
            let mappedVowel;
            if (prevCons && PALATALIZING.has(prevCons)) {
              mappedVowel = cfg.vowelsSoft[currentLower];
            } else if (cfg.isRussian && ["e", "i", "y"].includes(currentLower) && SPECIAL_PREV.has(prevCons)) {
              mappedVowel = cfg.vowelsSoft[currentLower];
            } else {
              mappedVowel = cfg.vowelsHard[currentLower];
            }
            result += matchSliceCasing(currentOriginal, mappedVowel);
          } else {
            result += currentOriginal;
          }
          prevCons = "";
          i += 1;
        }

        if (SOFT_SIGN_WORDS.has(wordLower)) {
          const lastChar = word[word.length - 1];
          result += (lastChar === lastChar.toUpperCase()) ? "Ь" : "ь";
        }

        return result;
      }

      document.getElementById("ortho-toggle").addEventListener('change', transcribe);
    </script>
  </body>
</html>
